name: mamacare
description: A maternal mental health and peer support platform for Indian mothers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  
  # UI & Design
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  animate_do: ^5.1.0
  
  # Firebase Core
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  cloud_functions: ^6.2.0
  
  # Auth
  google_sign_in: ^7.2.0
  
  # AI Engine
  google_generative_ai: ^0.4.7
  # Note: Vertex AI embeddings usually handled via Cloud Functions or REST API for text-embedding-004
  
  # Maps
  google_maps_flutter: ^2.5.3
  google_places_flutter: ^2.0.8
  
  # Payments
  razorpay_flutter: ^1.3.5
  
  # Utils & Features
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^13.1.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/products/
